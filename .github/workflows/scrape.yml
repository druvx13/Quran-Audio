name: Scrape everyayah.com Alafasy MP3s with HTTrack

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HTTrack
        run: |
          sudo apt-get update -y
          sudo apt-get install -y httrack

      - name: Scrape website
        run: |
          mkdir -p scraped-site
          httrack "https://everyayah.com/data/Alafasy_128kbps/" \
            -O "./scraped-site" \
            -v \
            -%e0 \
            -r0 \
            -c8 \
            --robots=0 \
            -s0 \
            -%P \
            -N0 \
            "+*.mp3"

      - name: Upload scraped site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: everyayah-alafasy-128kbps
          path: scraped-site/
          retention-days: 90
